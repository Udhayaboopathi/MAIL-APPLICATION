http:
  middlewares:
    secure-headers:
      headers:
        frameDeny: true
        contentTypeNosniff: true
        browserXssFilter: true
        forceSTSHeader: true
        stsIncludeSubdomains: true
        stsPreload: true
        stsSeconds: 31536000
  # routers and services intentionally omitted — use docker provider labels instead

tls:
  options:
    default:
      minVersion: VersionTLS12
