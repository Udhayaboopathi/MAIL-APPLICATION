[alembic]
script_location = migrations
; sqlalchemy.url removed from repository to avoid committing credentials.
; Set the DATABASE_URL environment variable for runtime/migrations, for example:
; export DATABASE_URL=postgresql+asyncpg://nexudo:your_password@postgres:5432/nexudo_mail
; Alembic env.py should read DATABASE_URL from the environment.

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
